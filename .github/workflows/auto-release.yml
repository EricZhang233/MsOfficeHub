
name: Auto Release

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    # weekly on Monday 03:00 UTC (adjust as needed)
    - cron: '0 3 * * 1'

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build (Release)
        run: dotnet build -c Release

      - name: Get Version
        id: get_version
        shell: pwsh
        run: |
          $version = (Get-Content Version.cs | Select-String 'Version' | ForEach-Object { [regex]::Match($_.ToString(), '"([^\"]+)"').Groups[1].Value })
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create zip of Release output
        shell: pwsh
        run: |
          $version = '${{ steps.get_version.outputs.version }}'
          $out = Join-Path $PWD 'bin/Release/net10.0-windows10.0.26100/win-x64'
          $dest = Join-Path $PWD ("output/MsOfficeHub_$version.zip")
          New-Item -ItemType Directory -Path (Split-Path $dest) -Force | Out-Null
          if (Test-Path $out) {
            Compress-Archive -Path (Join-Path $out '*') -DestinationPath $dest -Force
          } else {
            Write-Error "Output path not found: $out"
            exit 1
          }
          Write-Host "ZIP=$dest"

      - name: Create GitHub Prerelease (no assets)
        id: create_prerelease
        uses: actions/create-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: MsOfficeHub v${{ steps.get_version.outputs.version }} (auto)
          body: Automated prerelease from workflow ${{ github.workflow }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
